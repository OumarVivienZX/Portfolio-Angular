<section class="portfolio" id="portfolio">
  <div class="container d-flex flex-column justify-content-between h-100">

    <div class="section-title flex-grow-1">
      <div class="row">
        <div class="col-lg-12">
          <div class="text-center">
            <h2 data-aos="heading-show" class="text_background">
              My Projects
              <span class="heading_background">Portfolio</span>
            </h2>
            <p class="m-0">
              Some real-world projects I have designed and developed.
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="section-content flex-grow-1">
      <div class="row portfolio-items">
        @for (p of projects(); track p.id) {
          <div class="col-xl-4 col-lg-4 col-md-6 mb-2 mt-4">
            <div class="portfolio-item">
              <a [href]="p.lien || '#'" class="portfolio-single portfolio-image" target="_blank" rel="noopener noreferrer">
                <div class="item-box">
                  <div class="item-image">
                    <img
                      [src]="p.image || 'assets/images/Ecommerce.png'"
                      class="portfolio-img"
                      [alt]="p.resume"
                      (error)="$any($event.target).src='assets/images/Ecommerce.png'">
                  </div>
                  <div class="item-details d-flex align-items-center">
                    <div class="item-details-ins text-center w-100">
                      <div class="mb-2">
                        <span class="mbri-briefcase"></span>
                      </div>
                      <h3>{{ p.resume }}</h3>
                      @if (p.lien) {
                        <p class="m-0">Voir le projet</p>
                      } @else {
                        <p class="m-0 text-muted">Lien non renseigné</p>
                      }
                    </div>
                  </div>
                </div>
              </a>
            </div>
          </div>
        } @empty {
          <div class="col-12 mt-4">
            <p class="text-center m-0 text-muted">Aucun projet à afficher pour le moment.</p>
          </div>
        }
      </div>

      <div class="row">
        <div class="col-12 text-center mt-5">
          <a href="https://github.com/OumarVivienZX?tab=repositories" class="btn btn-outline-primary">
            <span><i class="fab fa-github"></i></span> See More
          </a>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- CSS pour uniformiser les images -->
<style>
.portfolio-img {
  width: 100%;       /* occupe toute la largeur de son conteneur */
  height: 350px;     /* hauteur fixe uniforme */
  object-fit: cover; /* garde le ratio et remplit la zone */
  border-radius: 8px;
}
</style>
