<section class="services" id="service">
  <div class="container d-flex flex-column justify-content-between h-100">

    <div class="section-title flex-grow-1">
      <div class="row">
        <div class="col-lg-12">
          <div class="text-center">
            <h2 data-aos="heading-show" class="text_background">
              What I Do
              <span class="heading_background">Services</span>
            </h2>
            <p class="m-0">
              I design and build modern, secure and scalable digital solutions.
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="section-content flex-grow-1">
      <div class="row">
        @for (s of services(); track s.id) {
          <div class="col-lg-4 col-md-6 mt-4 mb-2 d-flex">
            <div class="service-single text-left p-5 h-100 d-flex flex-column">
              <div class="service-icon">
                <span class="mbri-briefcase"></span>
              </div>
              <h3 class="my-3">{{ s.type_de_service }}</h3>
              <p class="flex-grow-1">{{ s.details }}</p>
              @if (s.outils) {
                <small class="text-muted">Outils: {{ s.outils }}</small>
              }
            </div>
          </div>
        } @empty {
          <div class="col-12 mt-4">
            <p class="text-center m-0 text-muted">Aucun service à afficher pour le moment.</p>
          </div>
        }
      </div>
    </div>

  </div>
</section>
